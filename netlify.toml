[build]
  # Puppeteer 24+ does not bundle Chrome; prerender needs a downloaded browser on CI.
  command = "npm install && npx puppeteer browsers install chrome && npm run build"
  publish = "dist"
  functions = "netlify/functions"
  
[build.environment]
  NODE_VERSION = "18.18.0"
  NPM_VERSION = "9"
  NPM_CONFIG_PRODUCTION = "false"
  # Backend API URL — must be the live ai-analysis-crew FastAPI service (not the static site).
  # Used by the app and by scripts/generate-netlify-redirects.mjs to proxy /api/* on sparefinder.org.
  # Update this when you redeploy Render; verify: curl "$VITE_API_URL/health"
  VITE_API_URL = "https://aiagent-sparefinder-org.onrender.com"
  VITE_AI_SERVICE_URL = "https://aiagent-sparefinder-org.onrender.com"
  VITE_AI_SERVICE_API_KEY = "geotech-dev-key-2024"
  # Supabase
  VITE_SUPABASE_URL = "https://bharlmgxoqdafjeeknmk.supabase.co"
  VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoYXJsbWd4b3FkYWZqZWVrbm1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTIwODM4NjUsImV4cCI6MjA2NzY1OTg2NX0.9zvRKIEEVNbcamjQ8hQJfMMsQJ2WX9S_BaAxbyOmj4w"
 # App settings
  VITE_APP_NAME = "SpareFinder"
  VITE_APP_URL = "https://sparefinder.org"

# SPA + API proxy rules are generated at build time into dist/_redirects
# (see scripts/generate-netlify-redirects.mjs). Do not add a catch-all here.

[context.production.environment]
  NODE_ENV = "production"
  NPM_CONFIG_PRODUCTION = "false"

[context.deploy-preview.environment]
  NODE_ENV = "production" 